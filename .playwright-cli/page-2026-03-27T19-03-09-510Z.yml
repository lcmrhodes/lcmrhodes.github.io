      - heading "Understand. Build. Translate." [level=2] [ref=e35]
      - paragraph [ref=e36]: "I like work that sits between explanation and execution: data that needs to be understood, systems that need to be made usable, and products that should feel intelligent rather than merely functional."
    - generic [ref=e37]:
      - paragraph [ref=e38]: "My background moves between population health, modeling, design, and product-like web work. That mix shows up in how I build: visual explanations when complexity is the problem, polished interfaces when adoption is the problem, and robust research or API tooling when trust is the problem."
